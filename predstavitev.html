<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brani svojo predstavitev</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            text-align: center;
            touch-action: none;
        }
        h2 { margin-top: 20px; color: #00ff88; font-size: 1.1rem; padding: 0 10px; }
        #game-container {
            position: relative;
            width: 100vw;
            height: 75vh;
            background: #222;
            border-bottom: 5px solid #00ff88;
            overflow: hidden;
            margin-top: 10px;
        }
        #player {
            position: absolute;
            bottom: 30px;
            left: 50%;
            width: 90px; /* Slightly wider for easier blocking */
            height: 18px;
            background: white;
            border-radius: 5px;
            transform: translateX(-50%);
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }
        .obstacle {
            position: absolute;
            width: 25px; /* Slightly smaller obstacles */
            height: 25px;
            background: #ff4444;
            border-radius: 4px;
        }
        #timer { font-size: 1.8rem; font-weight: bold; margin: 10px; color: #00ff88; }
    </style>
</head>
<body>

    <h2>Brani svojo predstavitev in se bori</h2>
    <div id="timer">Preživi: 30s</div>
    
    <div id="game-container">
        <div id="player"></div>
    </div>

    <script>
        const player = document.getElementById('player');
        const container = document.getElementById('game-container');
        const timerDisplay = document.getElementById('timer');
        
        let timeLeft = 30;
        let gameActive = true;
        let playerX = window.innerWidth / 2;
        let obstacles = [];
        let speedMultiplier = 0.8; // Started lower (was 1.0)

        // Move player with touch
        window.addEventListener('touchmove', (e) => {
            if (!gameActive) return;
            let touch = e.touches[0];
            playerX = touch.clientX;
            
            if (playerX < 45) playerX = 45;
            if (playerX > window.innerWidth - 45) playerX = window.innerWidth - 45;
            player.style.left = playerX + 'px';
        });

        function createObstacle() {
            if (!gameActive) return;
            const obs = document.createElement('div');
            obs.classList.add('obstacle');
            obs.style.left = Math.random() * (window.innerWidth - 30) + 'px';
            obs.style.top = '-40px';
            container.appendChild(obs);
            
            // Slower fall speed
            obstacles.push({ 
                element: obs, 
                top: -40, 
                speed: (Math.random() * 2 + 1.5) * speedMultiplier 
            });
            
            // Slower difficulty increase
            speedMultiplier += 0.02; 
            setTimeout(createObstacle, 800 / speedMultiplier);
        }

        function update() {
            if (!gameActive) return;

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.top += o.speed;
                o.element.style.top = o.top + 'px';

                let pRect = player.getBoundingClientRect();
                let oRect = o.element.getBoundingClientRect();

                // Added a small "grace" margin of 4px to make it more forgiving
                if (oRect.bottom > pRect.top + 4 && 
                    oRect.top < pRect.bottom - 4 && 
                    oRect.right > pRect.left + 4 && 
                    oRect.left < pRect.right - 4) {
                    gameOver();
                }

                if (o.top > window.innerHeight) {
                    o.element.remove();
                    obstacles.splice(i, 1);
                }
            }
            requestAnimationFrame(update);
        }

        function gameOver() {
            gameActive = false;
            alert("Ups! Zadel te je kvadrat. Poskusi še enkrat!");
            location.reload();
        }

        const countdown = setInterval(() => {
            if (!gameActive) {
                clearInterval(countdown);
                return;
            }
            timeLeft--;
            timerDisplay.innerText = `Preživi: ${timeLeft}s`;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                gameActive = false;
                alert("Bravo! Ubranil si svojo predstavitev!");
                window.location.href = "page3.html";
            }
        }, 1000);

        createObstacle();
        update();
    </script>
</body>
</html>
