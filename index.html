<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Secret Hub</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 20px;
            border: 1px solid #333;
            border-radius: 15px;
            background-color: #252525;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 3rem;
            color: #00ff88;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2rem;
            color: #cccccc;
        }
        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background-color: #00ff88;
            color: #1a1a1a;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn:hover {
            background-color: #00cc6e;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>The Secret Hub</h1>
        <p>Tukaj najdete nekaj zanimivih stvari. Zanimivo, kajne?</p>
        <a href="predstavitev.html" class="btn">Kje je moja predstavitev?</a>
    </div>

</body>
</html>
